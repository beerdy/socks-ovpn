services:
  socks_ovpn:
    build:
      context: .
    image: socks-ovpn
    cap_add:
      - net_admin
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 1080:1080
      - 8118:8118
    volumes:
      - ./config:/vpn/config
    dns:
      - 1.1.1.1
      - 8.8.8.8
    # environment:
    #   PROXY_USER: user
    #   PROXY_PASSWORD: pass
    restart: unless-stopped
